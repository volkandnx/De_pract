<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>German Practice</title>
  <style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --accent-vocab: #5b7dff;
  --accent-sentence: #1dd1a1;
  --accent-a1: #ff7675;
  --accent-a2: #fdcb6e;
  --accent-b1: #0984e3;
  --accent-b2: #9b59b6;
  --accent-mixed: #27ae60;
  --text-primary: #ffffff;
  --bg-dark: #0f1419;
}

body {
  font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
  background-color: var(--bg-dark);
  color: var(--text-primary);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 1rem;
}

.screen {
  display: none;
  width: 100%;
  max-width: 1200px;
  margin: 0 auto;
}

.screen.active {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ── HOME SCREEN ── */
#screen-home.active {
  justify-content: center;
  align-items: center;
}

.home-header {
  text-align: center;
  margin-bottom: 4rem;
}

.logo-icon {
  font-size: clamp(4rem, 15vw, 8rem);
  margin-bottom: 1rem;
}

.app-title {
  font-size: clamp(2.5rem, 8vw, 4rem);
  font-weight: 700;
  background: linear-gradient(135deg, #5b7dff, #ff6b9d);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 0.5rem;
}

.app-subtitle {
  font-size: clamp(1rem, 3vw, 1.5rem);
  color: #aaa;
}

.home-buttons {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: clamp(1rem, 4vw, 2rem);
  width: 100%;
  max-width: 900px;
}

.home-btn {
  padding: clamp(2rem, 5vw, 3.5rem);
  border: 2px solid rgba(255, 255, 255, 0.1);
  border-radius: clamp(1rem, 3vw, 2rem);
  background: linear-gradient(135deg, rgba(91, 125, 255, 0.1), rgba(91, 125, 255, 0.05));
  color: var(--text-primary);
  cursor: pointer;
  font-size: clamp(1.5rem, 4vw, 2rem);
  font-weight: 600;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: clamp(0.5rem, 2vw, 1rem);
  transition: all 0.3s ease;
}

.home-btn:hover {
  transform: translateY(-0.5rem);
  background: linear-gradient(135deg, rgba(91, 125, 255, 0.2), rgba(91, 125, 255, 0.15));
  border-color: rgba(255, 255, 255, 0.2);
}

.vocab-btn {
  background: linear-gradient(135deg, rgba(91, 125, 255, 0.15), rgba(91, 125, 255, 0.05));
  border-color: var(--accent-vocab);
}

.sentence-btn {
  background: linear-gradient(135deg, rgba(29, 209, 161, 0.15), rgba(29, 209, 161, 0.05));
  border-color: var(--accent-sentence);
}

.btn-icon {
  font-size: clamp(2rem, 6vw, 4rem);
}

.btn-label {
  font-weight: 700;
}

.btn-sub {
  font-size: clamp(0.8rem, 2vw, 1rem);
  color: #aaa;
  font-weight: 400;
}

/* ── LEVEL SELECTION SCREEN ── */
#screen-level.active,
#screen-vocabulary.active,
#screen-sentence.active {
  flex-direction: column;
  justify-content: flex-start;
}

.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: clamp(1rem, 2vw, 2rem);
  border-bottom: 1px solid rgba(255, 255, 255, 0.1);
  gap: 1rem;
}

.back-btn {
  padding: clamp(0.5rem, 1vw, 1rem) clamp(1rem, 2vw, 1.5rem);
  background-color: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
  color: var(--text-primary);
  border-radius: 0.5rem;
  cursor: pointer;
  font-size: clamp(0.9rem, 2vw, 1.1rem);
  font-weight: 600;
  transition: all 0.3s ease;
}

.back-btn:hover {
  background-color: rgba(255, 255, 255, 0.1);
}

.mode-title {
  flex: 1;
  text-align: center;
  font-size: clamp(1.5rem, 4vw, 2rem);
  font-weight: 700;
}

.counter {
  font-size: clamp(0.9rem, 2vw, 1.1rem);
  color: #aaa;
  min-width: 5rem;
  text-align: right;
}

.level-select-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: clamp(2rem, 4vw, 4rem);
}

.level-select-heading {
  font-size: clamp(1.2rem, 3vw, 1.8rem);
  margin-bottom: clamp(2rem, 4vw, 3rem);
  color: #ccc;
}

.level-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: clamp(1rem, 3vw, 2rem);
  width: 100%;
  max-width: 700px;
}

.level-btn {
  padding: clamp(1.5rem, 3vw, 2.5rem);
  border: 2px solid rgba(255, 255, 255, 0.1);
  border-radius: clamp(0.8rem, 2vw, 1.5rem);
  background: linear-gradient(135deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02));
  color: var(--text-primary);
  cursor: pointer;
  font-size: clamp(1.2rem, 3vw, 1.8rem);
  font-weight: 600;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: clamp(0.5rem, 1vw, 0.8rem);
  transition: all 0.3s ease;
}

.level-btn:hover {
  transform: translateY(-0.3rem);
}

.level-code {
  font-size: clamp(1.8rem, 4vw, 2.5rem);
  font-weight: 700;
}

.level-desc {
  font-size: clamp(0.8rem, 1.5vw, 1rem);
  color: #aaa;
  font-weight: 400;
}

.level-a1 {
  background: linear-gradient(135deg, rgba(255, 118, 117, 0.1), rgba(255, 118, 117, 0.05));
  border-color: var(--accent-a1);
}

.level-a1:hover {
  background: linear-gradient(135deg, rgba(255, 118, 117, 0.15), rgba(255, 118, 117, 0.1));
}

.level-a2 {
  background: linear-gradient(135deg, rgba(253, 203, 110, 0.1), rgba(253, 203, 110, 0.05));
  border-color: var(--accent-a2);
}

.level-a2:hover {
  background: linear-gradient(135deg, rgba(253, 203, 110, 0.15), rgba(253, 203, 110, 0.1));
}

.level-b1 {
  background: linear-gradient(135deg, rgba(9, 132, 227, 0.1), rgba(9, 132, 227, 0.05));
  border-color: var(--accent-b1);
}

.level-b1:hover {
  background: linear-gradient(135deg, rgba(9, 132, 227, 0.15), rgba(9, 132, 227, 0.1));
}

.level-b2 {
  background: linear-gradient(135deg, rgba(155, 89, 182, 0.1), rgba(155, 89, 182, 0.05));
  border-color: var(--accent-b2);
}

.level-b2:hover {
  background: linear-gradient(135deg, rgba(155, 89, 182, 0.15), rgba(155, 89, 182, 0.1));
}



.level-mixed {
  background: linear-gradient(135deg, rgba(39, 174, 96, 0.1), rgba(39, 174, 96, 0.05));
  border-color: var(--accent-mixed);
  grid-column: 1 / -1;
}

.level-mixed:hover {
  background: linear-gradient(135deg, rgba(39, 174, 96, 0.15), rgba(39, 174, 96, 0.1));
}

/* ── VOCABULARY SCREEN ── */
.vocab-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: clamp(2rem, 4vw, 4rem);
  text-align: center;
}

.level-badge {
  display: inline-block;
  padding: clamp(0.3rem, 1vw, 0.6rem) clamp(0.8rem, 2vw, 1.2rem);
  background-color: rgba(91, 125, 255, 0.2);
  border: 1px solid var(--accent-vocab);
  border-radius: 999px;
  color: var(--accent-vocab);
  font-weight: 700;
  font-size: clamp(0.8rem, 1.5vw, 1rem);
  margin-bottom: clamp(1rem, 2vw, 2rem);
}

.word-display {
  font-size: clamp(2.5rem, 10vw, 5rem);
  font-weight: 700;
  margin-bottom: clamp(1.5rem, 3vw, 2.5rem);
}

.example-sentence {
  background-color: rgba(255, 255, 255, 0.05);
  padding: clamp(1rem, 2vw, 1.5rem);
  border-radius: clamp(0.8rem, 1.5vw, 1rem);
  margin-bottom: clamp(2rem, 4vw, 3rem);
  border: 1px solid rgba(255, 255, 255, 0.1);
}

.example-label {
  color: var(--accent-vocab);
  font-weight: 700;
}

.question-display {
  font-size: clamp(1.8rem, 7vw, 3.5rem);
  font-weight: 700;
  margin-bottom: clamp(2rem, 4vw, 3rem);
  line-height: 1.2;
}

.sentence-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: clamp(2rem, 4vw, 4rem);
  text-align: center;
}

.options-section,
.answers-section {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: clamp(1rem, 2vw, 2rem);
  width: 100%;
}

.show-btn {
  padding: clamp(1rem, 2vw, 1.5rem);
  background-color: var(--accent-vocab);
  border: none;
  color: white;
  border-radius: clamp(0.8rem, 1.5vw, 1rem);
  cursor: pointer;
  font-size: clamp(1.1rem, 2.5vw, 1.5rem);
  font-weight: 600;
  transition: all 0.3s ease;
}

#sentence-show-btn {
  background-color: var(--accent-sentence);
}

.show-btn:hover {
  transform: translateY(-0.3rem);
  opacity: 0.9;
}

.show-btn.hidden {
  display: none;
}

.options-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: clamp(0.8rem, 2vw, 1.5rem);
  margin-top: clamp(1rem, 2vw, 2rem);
}

.options-grid.hidden {
  display: none;
}

.option-card {
  padding: clamp(1rem, 2vw, 1.5rem);
  background-color: rgba(91, 125, 255, 0.1);
  border: 2px solid rgba(91, 125, 255, 0.3);
  color: var(--text-primary);
  border-radius: clamp(0.6rem, 1.5vw, 1rem);
  cursor: pointer;
  font-size: clamp(0.95rem, 2vw, 1.2rem);
  font-weight: 500;
  transition: all 0.2s ease;
}

.option-card:hover {
  background-color: rgba(91, 125, 255, 0.2);
  border-color: rgba(91, 125, 255, 0.5);
}

.option-card.correct {
  background-color: rgba(39, 174, 96, 0.3);
  border-color: var(--accent-mixed);
  color: #1dd1a1;
}

.option-card.wrong {
  background-color: rgba(231, 76, 60, 0.3);
  border-color: #e74c3c;
  color: #ff7675;
}

.answers-list {
  display: flex;
  flex-direction: column;
  gap: clamp(0.8rem, 2vw, 1.5rem);
  margin-top: clamp(1rem, 2vw, 2rem);
}

.answers-list.hidden {
  display: none;
}

.answer-card {
  display: flex;
  gap: clamp(1rem, 2vw, 1.5rem);
  padding: clamp(1rem, 2vw, 1.5rem);
  background-color: rgba(29, 209, 161, 0.1);
  border: 2px solid rgba(29, 209, 161, 0.3);
  border-left: 4px solid var(--accent-sentence);
  border-radius: clamp(0.6rem, 1.5vw, 1rem);
  color: var(--text-primary);
  font-size: clamp(0.95rem, 2vw, 1.1rem);
  line-height: 1.5;
  animation: slideIn 0.3s ease;
}

@keyframes slideIn {
  from {
    opacity: 0;
    transform: translateX(-1rem);
  }
  to {
    opacity: 1;
    transform: translateX(0);
  }
}

.answer-num {
  min-width: 2rem;
  height: 2rem;
  display: flex;
  align-items: center;
  justify-content: center;
  background-color: var(--accent-sentence);
  color: var(--bg-dark);
  border-radius: 50%;
  font-weight: 700;
  flex-shrink: 0;
}

.no-results {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1rem;
  padding: 2rem;
  color: #888;
  font-size: clamp(1rem, 2vw, 1.3rem);
}

.no-results span {
  font-size: clamp(2rem, 5vw, 3rem);
}

.bottom-bar {
  display: flex;
  justify-content: space-between;
  gap: clamp(1rem, 2vw, 2rem);
  padding: clamp(1rem, 2vw, 2rem);
  border-top: 1px solid rgba(255, 255, 255, 0.1);
}

.nav-btn {
  flex: 1;
  padding: clamp(0.8rem, 1.5vw, 1.2rem);
  background-color: rgba(91, 125, 255, 0.15);
  border: 2px solid rgba(91, 125, 255, 0.3);
  color: var(--text-primary);
  border-radius: clamp(0.6rem, 1.5vw, 1rem);
  cursor: pointer;
  font-size: clamp(1rem, 2vw, 1.3rem);
  font-weight: 600;
  transition: all 0.2s ease;
}

#sentence-prev,
#sentence-next {
  background-color: rgba(29, 209, 161, 0.15);
  border-color: rgba(29, 209, 161, 0.3);
}

.nav-btn:hover:not(:disabled) {
  background-color: rgba(91, 125, 255, 0.25);
  border-color: rgba(91, 125, 255, 0.5);
}

#sentence-prev:hover:not(:disabled),
#sentence-next:hover:not(:disabled) {
  background-color: rgba(29, 209, 161, 0.25);
  border-color: rgba(29, 209, 161, 0.5);
}

.nav-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

.inline-translate-btn {
  background-color: rgba(91, 125, 255, 0.15);
  border: 1px solid rgba(91, 125, 255, 0.5);
  border-radius: 0.5rem;
  color: var(--text-primary);
  cursor: pointer;
  font-size: clamp(1.2rem, 2vw, 1.5rem);
  width: clamp(2.5rem, 4vw, 3.5rem);
  height: clamp(2.5rem, 4vw, 3.5rem);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s ease;
  flex-shrink: 0;
}

.inline-translate-btn:hover {
  background-color: rgba(91, 125, 255, 0.3);
  border-color: rgba(91, 125, 255, 0.8);
  transform: translateY(-2px);
}

.answer-translate-btn {
  margin-left: auto;
}

.top-bar-spacer {
  min-width: 5rem;
}
  </style>
</head>
<body>

  <!-- HOME SCREEN -->
  <div id="screen-home" class="screen active">
    <div class="home-header">
      <div class="logo-icon">📚</div>
      <h1 class="app-title">German Practice</h1>
      <p class="app-subtitle">Volkan DENİZ- Aslı AYKURT</p>
    </div>
    <div class="home-buttons">
      <button class="home-btn vocab-btn" onclick="startMode('vocabulary')">
        <span class="btn-icon">🔤</span>
        <span class="btn-label">Vocabulary</span>
        <span class="btn-sub">Word Recognition</span>
      </button>
      <button class="home-btn sentence-btn" onclick="startMode('sentence')">
        <span class="btn-icon">💬</span>
        <span class="btn-label">Sentence<br>Practice</span>
        <span class="btn-sub">Answer Formation</span>
      </button>
    </div>
  </div>

  <!-- LEVEL SELECTION SCREEN -->
  <div id="screen-level" class="screen">
    <div class="top-bar">
      <button class="back-btn" onclick="goHome()">← Main Menu</button>
      <div class="mode-title" id="level-mode-title">Vocabulary</div>
      <div class="top-bar-spacer"></div>
    </div>
    <div class="level-select-content">
      <p class="level-select-heading">Select a level to begin</p>
      <div class="level-grid">
        <button class="level-btn level-a1" onclick="selectLevel('A1')">
          <span class="level-code">A1</span>
          <span class="level-desc">Beginner</span>
        </button>
        <button class="level-btn level-a2" onclick="selectLevel('A2')">
          <span class="level-code">A2</span>
          <span class="level-desc">Elementary</span>
        </button>
        <button class="level-btn level-b1" onclick="selectLevel('B1')">
          <span class="level-code">B1</span>
          <span class="level-desc">Pre-Intermediate</span>
        </button>
        <button class="level-btn level-b2" onclick="selectLevel('B2')">
          <span class="level-code">B2</span>
          <span class="level-desc">Upper-Intermediate</span>
        </button>
          <span class="level-desc">Advanced</span>
        </button>
        <button class="level-btn level-mixed" onclick="selectLevel('mixed')">
          <span class="level-code">🔀</span>
          <span class="level-desc">Mixed – All Levels</span>
        </button>
      </div>
    </div>
  </div>

  <!-- VOCABULARY SCREEN -->
  <div id="screen-vocabulary" class="screen">
    <div class="top-bar">
      <button class="back-btn" onclick="goLevelSelect()">← Levels</button>
      <div class="mode-title">Vocabulary</div>
      <div class="counter" id="vocab-counter">1 / 10</div>
    </div>

    <div class="vocab-content">
      <div class="level-badge" id="vocab-level">B2</div>
      <div class="word-display" id="vocab-word">Persistence</div>
      <div class="example-sentence">
        <div style="display: flex; align-items: flex-start; justify-content: center; gap: 1rem;">
          <div>
            <span class="example-label">Example:</span>
            <span id="vocab-example-text">His persistence finally paid off when he got the job.</span>
          </div>
          <button class="inline-translate-btn" onclick="toggleVocabTranslation()" title="Çeviriyi Göster/Gizle">🇹🇷</button>
        </div>
        <div id="vocab-example-tr" style="display: none; color: #ffeb3b; margin-top: 0.5rem; font-size: 0.95rem;"></div>
      </div>
    </div>

    <div class="options-section">
      <button class="show-btn" id="vocab-show-btn" onclick="showVocabOptions()">
        👁 Show Options
      </button>
      <div class="options-grid hidden" id="vocab-options"></div>
    </div>

    <div class="bottom-bar">
      <button class="nav-btn" id="vocab-prev" onclick="prevItem('vocabulary')">◀ Previous</button>
      <button class="nav-btn next-btn" id="vocab-next" onclick="nextItem('vocabulary')">Next ▶</button>
    </div>
  </div>

  <!-- SENTENCE SCREEN -->
  <div id="screen-sentence" class="screen">
    <div class="top-bar">
      <button class="back-btn" onclick="goLevelSelect()">← Levels</button>
      <div class="mode-title">Sentence Practice</div>
      <div class="counter" id="sentence-counter">1 / 8</div>
    </div>

    <div class="sentence-content">
      <div class="level-badge" id="sentence-level">A1</div>
      <div style="display: flex; align-items: flex-start; justify-content: center; gap: 1rem; margin-bottom: clamp(2rem, 4vw, 3rem);">
        <div class="question-display" id="sentence-question" style="margin-bottom: 0;">
          What would you do if you were the president?
        </div>
        <button class="inline-translate-btn" onclick="toggleQuestionTranslation()" title="Çeviriyi Göster/Gizle">🇹🇷</button>
      </div>
      <div class="question-display" id="sentence-question-tr" style="display: none; color: #ffeb3b; font-size: clamp(1.2rem, 5vw, 2.5rem); margin-bottom: clamp(2rem, 4vw, 3rem);">
      </div>
    </div>

    <div class="answers-section">
      <button class="show-btn" id="sentence-show-btn" onclick="showSentenceAnswers()">
        💡 Show Answers
      </button>
      <div class="answers-list hidden" id="sentence-answers"></div>
    </div>

    <div class="bottom-bar">
      <button class="nav-btn" id="sentence-prev" onclick="prevItem('sentence')">◀ Previous</button>
      <button class="nav-btn next-btn" id="sentence-next" onclick="nextItem('sentence')">Next ▶</button>
    </div>
  </div>

  <script>
const data = {
  "vocabulary": [

    {"word":"bitte","level":"A1","options":["lütfen","hayır","evet","güle güle"],"answer":"lütfen","example":"Bitte hilf mir!","example_tr":"Lütfen bana yardım et!"},
    {"word":"ja","level":"A1","options":["evet","hayır","belki","hiç"],"answer":"evet","example":"Ja, ich komme morgen.","example_tr":"Evet, yarın geleceğim."},
    {"word":"nein","level":"A1","options":["hayır","evet","belki","tamam"],"answer":"hayır","example":"Nein, ich mag das nicht.","example_tr":"Hayır, bunu sevmiyorum."},
    {"word":"gut","level":"A1","options":["iyi","kötü","büyük","küçük"],"answer":"iyi","example":"Das Essen ist sehr gut.","example_tr":"Yemek çok güzel."},
    {"word":"schlecht","level":"A1","options":["kötü","iyi","güzel","hızlı"],"answer":"kötü","example":"Das Wetter ist heute schlecht.","example_tr":"Hava bugün kötü."},
    {"word":"groß","level":"A1","options":["büyük","küçük","uzun","kısa"],"answer":"büyük","example":"Das Haus ist sehr groß.","example_tr":"Ev çok büyük."},
    {"word":"klein","level":"A1","options":["küçük","büyük","yeni","eski"],"answer":"küçük","example":"Die Katze ist sehr klein.","example_tr":"Kedi çok küçük."},
    {"word":"schön","level":"A1","options":["güzel","çirkin","büyük","eski"],"answer":"güzel","example":"Das ist ein schöner Tag.","example_tr":"Bu güzel bir gün."},

  <script>

let currentMode = null;
let filteredItems = [];
let currentIndex = 0;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function loadData() {
  // Shuffle once on load so order is random every session
  data.vocabulary = shuffle(data.vocabulary);
  data.sentence_practice = shuffle(data.sentence_practice);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goHome() {
  currentMode = null;
  showScreen('screen-home');
}

function goLevelSelect() {
  showScreen('screen-level');
}

async function startMode(mode) {
  if (!data.vocabulary.length) loadData();
  currentMode = mode;
  document.getElementById('level-mode-title').textContent =
    mode === 'vocabulary' ? 'Vocabulary' : 'Sentence Practice';
  showScreen('screen-level');
}

function selectLevel(level) {
  if (currentMode === 'vocabulary') {
    const pool = level === 'mixed'
      ? data.vocabulary
      : data.vocabulary.filter(item => item.level === level);
    filteredItems = shuffle(pool);
    currentIndex = 0;
    renderVocab();
    showScreen('screen-vocabulary');
  } else {
    const pool = level === 'mixed'
      ? data.sentence_practice
      : data.sentence_practice.filter(item => item.level === level);
    filteredItems = shuffle(pool);
    currentIndex = 0;
    renderSentence();
    showScreen('screen-sentence');
  }
}

/* ── VOCABULARY ── */
function renderVocab() {
  const total = filteredItems.length;

  if (total === 0) {
    document.getElementById('vocab-word').textContent = '';
    document.getElementById('vocab-example-text').textContent = '';
    document.getElementById('vocab-level').textContent = '';
    document.getElementById('vocab-counter').textContent = '0 / 0';
    document.getElementById('vocab-show-btn').classList.add('hidden');
    document.getElementById('vocab-options').innerHTML =
      '<div class="no-results"><span>🔍</span>No questions available for this level.</div>';
    document.getElementById('vocab-options').classList.remove('hidden');
    document.getElementById('vocab-prev').disabled = true;
    document.getElementById('vocab-next').disabled = true;
    return;
  }

  const item = filteredItems[currentIndex];
  document.getElementById('vocab-counter').textContent = `${currentIndex + 1} / ${total}`;
  document.getElementById('vocab-level').textContent = item.level;
  document.getElementById('vocab-word').textContent = item.word;
  document.getElementById('vocab-example-text').textContent = item.example;
  document.getElementById('vocab-example-tr').textContent = item.example_tr || '(Çeviri yok)';
  document.getElementById('vocab-example-tr').style.display = 'none';

  const grid = document.getElementById('vocab-options');
  grid.innerHTML = '';
  grid.classList.add('hidden');

  const showBtn = document.getElementById('vocab-show-btn');
  showBtn.classList.remove('hidden');
  showBtn.textContent = '👁 Show Options';

  document.getElementById('vocab-prev').disabled = currentIndex === 0;
  document.getElementById('vocab-next').disabled = currentIndex === total - 1;
}

function showVocabOptions() {
  const item = filteredItems[currentIndex];
  const grid = document.getElementById('vocab-options');

  const opts = shuffle(item.options);
  grid.innerHTML = '';
  opts.forEach(opt => {
    const card = document.createElement('button');
    card.className = 'option-card';
    card.textContent = opt;
    card.onclick = () => selectOption(grid, opt, item.answer);
    grid.appendChild(card);
  });

  grid.classList.remove('hidden');
  document.getElementById('vocab-show-btn').classList.add('hidden');
}

function selectOption(grid, selected, answer) {
  grid.querySelectorAll('.option-card').forEach(c => {
    c.onclick = null;
    c.classList.add(c.textContent === answer ? 'correct' : 'wrong');
  });
}

/* ── SENTENCE ── */
function renderSentence() {
  const total = filteredItems.length;

  if (total === 0) {
    document.getElementById('sentence-question').textContent = '';
    document.getElementById('sentence-level').textContent = '';
    document.getElementById('sentence-counter').textContent = '0 / 0';
    document.getElementById('sentence-show-btn').classList.add('hidden');
    document.getElementById('sentence-answers').innerHTML =
      '<div class="no-results"><span>🔍</span>No questions available for this level.</div>';
    document.getElementById('sentence-answers').classList.remove('hidden');
    document.getElementById('sentence-prev').disabled = true;
    document.getElementById('sentence-next').disabled = true;
    return;
  }

  const item = filteredItems[currentIndex];
  document.getElementById('sentence-counter').textContent = `${currentIndex + 1} / ${total}`;
  document.getElementById('sentence-level').textContent = item.level;
  document.getElementById('sentence-question').textContent = item.question;
  document.getElementById('sentence-question-tr').textContent = item.question_tr;
  document.getElementById('sentence-question-tr').style.display = 'none';

  const list = document.getElementById('sentence-answers');
  list.innerHTML = '';
  list.classList.add('hidden');

  const showBtn = document.getElementById('sentence-show-btn');
  showBtn.classList.remove('hidden');

  document.getElementById('sentence-prev').disabled = currentIndex === 0;
  document.getElementById('sentence-next').disabled = currentIndex === total - 1;
}

function showSentenceAnswers() {
  const item = filteredItems[currentIndex];
  const list = document.getElementById('sentence-answers');

  list.innerHTML = '';
  item.alternatives.forEach((alt, i) => {
    const card = document.createElement('div');
    card.className = 'answer-card';
    card.style.alignItems = 'center';
    
    const trHtml = item.alternatives_tr && item.alternatives_tr[i] ? `<span id="answer-tr-${i}" style="display: none; color: #e58e26; font-weight: bold; font-size: 0.9em; margin-top: 0.5rem;">${item.alternatives_tr[i]}</span>` : '';
    const btnHtml = item.alternatives_tr && item.alternatives_tr[i] ? `<button class="inline-translate-btn answer-translate-btn" onclick="toggleAnswerTranslation(${i})" title="Çeviriyi Göster/Gizle">🇹🇷</button>` : '';
    
    card.innerHTML = `<span class="answer-num">${i + 1}</span><div style="display: flex; flex-direction: column; flex: 1;"><span>${alt}</span>${trHtml}</div>${btnHtml}`;
    list.appendChild(card);
  });

  list.classList.remove('hidden');
  document.getElementById('sentence-show-btn').classList.add('hidden');
}

function toggleVocabTranslation() {
  const trEl = document.getElementById('vocab-example-tr');
  trEl.style.display = trEl.style.display === 'none' ? 'block' : 'none';
}

function toggleQuestionTranslation() {
  const trEl = document.getElementById('sentence-question-tr');
  trEl.style.display = trEl.style.display === 'none' ? 'block' : 'none';
}

function toggleAnswerTranslation(index) {
  const trEl = document.getElementById(`answer-tr-${index}`);
  if (trEl) {
    trEl.style.display = trEl.style.display === 'none' ? 'block' : 'none';
  }
}

/* ── NAVIGATION ── */
function nextItem(mode) {
  if (currentIndex < filteredItems.length - 1) {
    currentIndex++;
    mode === 'vocabulary' ? renderVocab() : renderSentence();
  }
}

function prevItem(mode) {
  if (currentIndex > 0) {
    currentIndex--;
    mode === 'vocabulary' ? renderVocab() : renderSentence();
  }
}

/* ── KEYBOARD SHORTCUTS ── */
document.addEventListener('keydown', e => {
  const vocabActive   = document.getElementById('screen-vocabulary').classList.contains('active');
  const sentenceActive = document.getElementById('screen-sentence').classList.contains('active');
  const levelActive   = document.getElementById('screen-level').classList.contains('active');

  if (e.key === 'ArrowRight') {
    if (vocabActive)    nextItem('vocabulary');
    if (sentenceActive) nextItem('sentence');
  } else if (e.key === 'ArrowLeft') {
    if (vocabActive)    prevItem('vocabulary');
    if (sentenceActive) prevItem('sentence');
  } else if (e.key === ' ' || e.key === 'Enter') {
    e.preventDefault();
    if (vocabActive) {
      const btn = document.getElementById('vocab-show-btn');
      if (!btn.classList.contains('hidden')) showVocabOptions();
    }
    if (sentenceActive) {
      const btn = document.getElementById('sentence-show-btn');
      if (!btn.classList.contains('hidden')) showSentenceAnswers();
    }
  } else if (e.key === 'Escape') {
    if (vocabActive || sentenceActive) goLevelSelect();
    else if (levelActive) goHome();
  }
});

loadData();
  </script>
</body>
</html>

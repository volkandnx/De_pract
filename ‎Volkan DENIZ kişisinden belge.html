<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>English Practice</title>
  <style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --accent-vocab: #5b7dff;
  --accent-sentence: #1dd1a1;
  --accent-b1: #0984e3;
  --accent-b2: #9b59b6;
  --accent-c1: #e67e22;
  --accent-mixed: #27ae60;
  --text-primary: #ffffff;
  --bg-dark: #0f1419;
}

body {
  font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
  background-color: var(--bg-dark);
  color: var(--text-primary);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 1rem;
}

.screen {
  display: none;
  width: 100%;
  max-width: 1200px;
  margin: 0 auto;
}

.screen.active {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ── HOME SCREEN ── */
#screen-home.active {
  justify-content: center;
  align-items: center;
}

.home-header {
  text-align: center;
  margin-bottom: 4rem;
}

.logo-icon {
  font-size: clamp(4rem, 15vw, 8rem);
  margin-bottom: 1rem;
}

.app-title {
  font-size: clamp(2.5rem, 8vw, 4rem);
  font-weight: 700;
  background: linear-gradient(135deg, #5b7dff, #ff6b9d);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 0.5rem;
}

.app-subtitle {
  font-size: clamp(1rem, 3vw, 1.5rem);
  color: #aaa;
}

.home-buttons {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: clamp(1rem, 4vw, 2rem);
  width: 100%;
  max-width: 900px;
}

.home-btn {
  padding: clamp(2rem, 5vw, 3.5rem);
  border: 2px solid rgba(255, 255, 255, 0.1);
  border-radius: clamp(1rem, 3vw, 2rem);
  background: linear-gradient(135deg, rgba(91, 125, 255, 0.1), rgba(91, 125, 255, 0.05));
  color: var(--text-primary);
  cursor: pointer;
  font-size: clamp(1.5rem, 4vw, 2rem);
  font-weight: 600;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: clamp(0.5rem, 2vw, 1rem);
  transition: all 0.3s ease;
}

.home-btn:hover {
  transform: translateY(-0.5rem);
  background: linear-gradient(135deg, rgba(91, 125, 255, 0.2), rgba(91, 125, 255, 0.15));
  border-color: rgba(255, 255, 255, 0.2);
}

.vocab-btn {
  background: linear-gradient(135deg, rgba(91, 125, 255, 0.15), rgba(91, 125, 255, 0.05));
  border-color: var(--accent-vocab);
}

.sentence-btn {
  background: linear-gradient(135deg, rgba(29, 209, 161, 0.15), rgba(29, 209, 161, 0.05));
  border-color: var(--accent-sentence);
}

.btn-icon {
  font-size: clamp(2rem, 6vw, 4rem);
}

.btn-label {
  font-weight: 700;
}

.btn-sub {
  font-size: clamp(0.8rem, 2vw, 1rem);
  color: #aaa;
  font-weight: 400;
}

/* ── LEVEL SELECTION SCREEN ── */
#screen-level.active,
#screen-vocabulary.active,
#screen-sentence.active {
  flex-direction: column;
  justify-content: flex-start;
}

.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: clamp(1rem, 2vw, 2rem);
  border-bottom: 1px solid rgba(255, 255, 255, 0.1);
  gap: 1rem;
}

.back-btn {
  padding: clamp(0.5rem, 1vw, 1rem) clamp(1rem, 2vw, 1.5rem);
  background-color: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
  color: var(--text-primary);
  border-radius: 0.5rem;
  cursor: pointer;
  font-size: clamp(0.9rem, 2vw, 1.1rem);
  font-weight: 600;
  transition: all 0.3s ease;
}

.back-btn:hover {
  background-color: rgba(255, 255, 255, 0.1);
}

.mode-title {
  flex: 1;
  text-align: center;
  font-size: clamp(1.5rem, 4vw, 2rem);
  font-weight: 700;
}

.counter {
  font-size: clamp(0.9rem, 2vw, 1.1rem);
  color: #aaa;
  min-width: 5rem;
  text-align: right;
}

.level-select-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: clamp(2rem, 4vw, 4rem);
}

.level-select-heading {
  font-size: clamp(1.2rem, 3vw, 1.8rem);
  margin-bottom: clamp(2rem, 4vw, 3rem);
  color: #ccc;
}

.level-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: clamp(1rem, 3vw, 2rem);
  width: 100%;
  max-width: 700px;
}

.level-btn {
  padding: clamp(1.5rem, 3vw, 2.5rem);
  border: 2px solid rgba(255, 255, 255, 0.1);
  border-radius: clamp(0.8rem, 2vw, 1.5rem);
  background: linear-gradient(135deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02));
  color: var(--text-primary);
  cursor: pointer;
  font-size: clamp(1.2rem, 3vw, 1.8rem);
  font-weight: 600;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: clamp(0.5rem, 1vw, 0.8rem);
  transition: all 0.3s ease;
}

.level-btn:hover {
  transform: translateY(-0.3rem);
}

.level-code {
  font-size: clamp(1.8rem, 4vw, 2.5rem);
  font-weight: 700;
}

.level-desc {
  font-size: clamp(0.8rem, 1.5vw, 1rem);
  color: #aaa;
  font-weight: 400;
}

.level-b1 {
  background: linear-gradient(135deg, rgba(9, 132, 227, 0.1), rgba(9, 132, 227, 0.05));
  border-color: var(--accent-b1);
}

.level-b1:hover {
  background: linear-gradient(135deg, rgba(9, 132, 227, 0.15), rgba(9, 132, 227, 0.1));
}

.level-b2 {
  background: linear-gradient(135deg, rgba(155, 89, 182, 0.1), rgba(155, 89, 182, 0.05));
  border-color: var(--accent-b2);
}

.level-b2:hover {
  background: linear-gradient(135deg, rgba(155, 89, 182, 0.15), rgba(155, 89, 182, 0.1));
}

.level-c1 {
  background: linear-gradient(135deg, rgba(230, 126, 34, 0.1), rgba(230, 126, 34, 0.05));
  border-color: var(--accent-c1);
}

.level-c1:hover {
  background: linear-gradient(135deg, rgba(230, 126, 34, 0.15), rgba(230, 126, 34, 0.1));
}

.level-mixed {
  background: linear-gradient(135deg, rgba(39, 174, 96, 0.1), rgba(39, 174, 96, 0.05));
  border-color: var(--accent-mixed);
  grid-column: 1 / -1;
}

.level-mixed:hover {
  background: linear-gradient(135deg, rgba(39, 174, 96, 0.15), rgba(39, 174, 96, 0.1));
}

/* ── VOCABULARY SCREEN ── */
.vocab-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: clamp(2rem, 4vw, 4rem);
  text-align: center;
}

.level-badge {
  display: inline-block;
  padding: clamp(0.3rem, 1vw, 0.6rem) clamp(0.8rem, 2vw, 1.2rem);
  background-color: rgba(91, 125, 255, 0.2);
  border: 1px solid var(--accent-vocab);
  border-radius: 999px;
  color: var(--accent-vocab);
  font-weight: 700;
  font-size: clamp(0.8rem, 1.5vw, 1rem);
  margin-bottom: clamp(1rem, 2vw, 2rem);
}

.word-display {
  font-size: clamp(2.5rem, 10vw, 5rem);
  font-weight: 700;
  margin-bottom: clamp(1.5rem, 3vw, 2.5rem);
}

.example-sentence {
  background-color: rgba(255, 255, 255, 0.05);
  padding: clamp(1rem, 2vw, 1.5rem);
  border-radius: clamp(0.8rem, 1.5vw, 1rem);
  margin-bottom: clamp(2rem, 4vw, 3rem);
  border: 1px solid rgba(255, 255, 255, 0.1);
}

.example-label {
  color: var(--accent-vocab);
  font-weight: 700;
}

.question-display {
  font-size: clamp(1.8rem, 7vw, 3.5rem);
  font-weight: 700;
  margin-bottom: clamp(2rem, 4vw, 3rem);
  line-height: 1.2;
}

.sentence-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: clamp(2rem, 4vw, 4rem);
  text-align: center;
}

.options-section,
.answers-section {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: clamp(1rem, 2vw, 2rem);
  width: 100%;
}

.show-btn {
  padding: clamp(1rem, 2vw, 1.5rem);
  background-color: var(--accent-vocab);
  border: none;
  color: white;
  border-radius: clamp(0.8rem, 1.5vw, 1rem);
  cursor: pointer;
  font-size: clamp(1.1rem, 2.5vw, 1.5rem);
  font-weight: 600;
  transition: all 0.3s ease;
}

#sentence-show-btn {
  background-color: var(--accent-sentence);
}

.show-btn:hover {
  transform: translateY(-0.3rem);
  opacity: 0.9;
}

.show-btn.hidden {
  display: none;
}

.options-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: clamp(0.8rem, 2vw, 1.5rem);
  margin-top: clamp(1rem, 2vw, 2rem);
}

.options-grid.hidden {
  display: none;
}

.option-card {
  padding: clamp(1rem, 2vw, 1.5rem);
  background-color: rgba(91, 125, 255, 0.1);
  border: 2px solid rgba(91, 125, 255, 0.3);
  color: var(--text-primary);
  border-radius: clamp(0.6rem, 1.5vw, 1rem);
  cursor: pointer;
  font-size: clamp(0.95rem, 2vw, 1.2rem);
  font-weight: 500;
  transition: all 0.2s ease;
}

.option-card:hover {
  background-color: rgba(91, 125, 255, 0.2);
  border-color: rgba(91, 125, 255, 0.5);
}

.option-card.correct {
  background-color: rgba(39, 174, 96, 0.3);
  border-color: var(--accent-mixed);
  color: #1dd1a1;
}

.option-card.wrong {
  background-color: rgba(231, 76, 60, 0.3);
  border-color: #e74c3c;
  color: #ff7675;
}

.answers-list {
  display: flex;
  flex-direction: column;
  gap: clamp(0.8rem, 2vw, 1.5rem);
  margin-top: clamp(1rem, 2vw, 2rem);
}

.answers-list.hidden {
  display: none;
}

.answer-card {
  display: flex;
  gap: clamp(1rem, 2vw, 1.5rem);
  padding: clamp(1rem, 2vw, 1.5rem);
  background-color: rgba(29, 209, 161, 0.1);
  border: 2px solid rgba(29, 209, 161, 0.3);
  border-left: 4px solid var(--accent-sentence);
  border-radius: clamp(0.6rem, 1.5vw, 1rem);
  color: var(--text-primary);
  font-size: clamp(0.95rem, 2vw, 1.1rem);
  line-height: 1.5;
  animation: slideIn 0.3s ease;
}

@keyframes slideIn {
  from {
    opacity: 0;
    transform: translateX(-1rem);
  }
  to {
    opacity: 1;
    transform: translateX(0);
  }
}

.answer-num {
  min-width: 2rem;
  height: 2rem;
  display: flex;
  align-items: center;
  justify-content: center;
  background-color: var(--accent-sentence);
  color: var(--bg-dark);
  border-radius: 50%;
  font-weight: 700;
  flex-shrink: 0;
}

.no-results {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1rem;
  padding: 2rem;
  color: #888;
  font-size: clamp(1rem, 2vw, 1.3rem);
}

.no-results span {
  font-size: clamp(2rem, 5vw, 3rem);
}

.bottom-bar {
  display: flex;
  justify-content: space-between;
  gap: clamp(1rem, 2vw, 2rem);
  padding: clamp(1rem, 2vw, 2rem);
  border-top: 1px solid rgba(255, 255, 255, 0.1);
}

.nav-btn {
  flex: 1;
  padding: clamp(0.8rem, 1.5vw, 1.2rem);
  background-color: rgba(91, 125, 255, 0.15);
  border: 2px solid rgba(91, 125, 255, 0.3);
  color: var(--text-primary);
  border-radius: clamp(0.6rem, 1.5vw, 1rem);
  cursor: pointer;
  font-size: clamp(1rem, 2vw, 1.3rem);
  font-weight: 600;
  transition: all 0.2s ease;
}

#sentence-prev,
#sentence-next {
  background-color: rgba(29, 209, 161, 0.15);
  border-color: rgba(29, 209, 161, 0.3);
}

.nav-btn:hover:not(:disabled) {
  background-color: rgba(91, 125, 255, 0.25);
  border-color: rgba(91, 125, 255, 0.5);
}

#sentence-prev:hover:not(:disabled),
#sentence-next:hover:not(:disabled) {
  background-color: rgba(29, 209, 161, 0.25);
  border-color: rgba(29, 209, 161, 0.5);
}

.nav-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

.top-bar-spacer {
  min-width: 5rem;
}
  </style>
</head>
<body>

  <!-- HOME SCREEN -->
  <div id="screen-home" class="screen active">
    <div class="home-header">
      <div class="logo-icon">📚</div>
      <h1 class="app-title">English Practice</h1>
      <p class="app-subtitle">Volkan DENIZ - Ayse ZELYUT</p>
    </div>
    <div class="home-buttons">
      <button class="home-btn vocab-btn" onclick="startMode('vocabulary')">
        <span class="btn-icon">🔤</span>
        <span class="btn-label">Vocabulary</span>
        <span class="btn-sub">Word Recognition</span>
      </button>
      <button class="home-btn sentence-btn" onclick="startMode('sentence')">
        <span class="btn-icon">💬</span>
        <span class="btn-label">Sentence<br>Practice</span>
        <span class="btn-sub">Answer Formation</span>
      </button>
    </div>
  </div>

  <!-- LEVEL SELECTION SCREEN -->
  <div id="screen-level" class="screen">
    <div class="top-bar">
      <button class="back-btn" onclick="goHome()">← Main Menu</button>
      <div class="mode-title" id="level-mode-title">Vocabulary</div>
      <div class="top-bar-spacer"></div>
    </div>
    <div class="level-select-content">
      <p class="level-select-heading">Select a level to begin</p>
      <div class="level-grid">
        <button class="level-btn level-b1" onclick="selectLevel('B1')">
          <span class="level-code">B1</span>
          <span class="level-desc">Pre-Intermediate</span>
        </button>
        <button class="level-btn level-b2" onclick="selectLevel('B2')">
          <span class="level-code">B2</span>
          <span class="level-desc">Upper-Intermediate</span>
        </button>
        <button class="level-btn level-c1" onclick="selectLevel('C1')">
          <span class="level-code">C1</span>
          <span class="level-desc">Advanced</span>
        </button>
        <button class="level-btn level-mixed" onclick="selectLevel('mixed')">
          <span class="level-code">🔀</span>
          <span class="level-desc">Mixed – All Levels</span>
        </button>
      </div>
    </div>
  </div>

  <!-- VOCABULARY SCREEN -->
  <div id="screen-vocabulary" class="screen">
    <div class="top-bar">
      <button class="back-btn" onclick="goLevelSelect()">← Levels</button>
      <div class="mode-title">Vocabulary</div>
      <div class="counter" id="vocab-counter">1 / 10</div>
    </div>

    <div class="vocab-content">
      <div class="level-badge" id="vocab-level">B2</div>
      <div class="word-display" id="vocab-word">Persistence</div>
      <div class="example-sentence">
        <span class="example-label">Example:</span>
        <span id="vocab-example-text">His persistence finally paid off when he got the job.</span>
      </div>
    </div>

    <div class="options-section">
      <button class="show-btn" id="vocab-show-btn" onclick="showVocabOptions()">
        👁 Show Options
      </button>
      <div class="options-grid hidden" id="vocab-options"></div>
    </div>

    <div class="bottom-bar">
      <button class="nav-btn" id="vocab-prev" onclick="prevItem('vocabulary')">◀ Previous</button>
      <button class="nav-btn next-btn" id="vocab-next" onclick="nextItem('vocabulary')">Next ▶</button>
    </div>
  </div>

  <!-- SENTENCE SCREEN -->
  <div id="screen-sentence" class="screen">
    <div class="top-bar">
      <button class="back-btn" onclick="goLevelSelect()">← Levels</button>
      <div class="mode-title">Sentence Practice</div>
      <div class="counter" id="sentence-counter">1 / 8</div>
    </div>

    <div class="sentence-content">
      <div class="level-badge" id="sentence-level">C1</div>
      <div class="question-display" id="sentence-question">
        What would you do if you were the president?
      </div>
    </div>

    <div class="answers-section">
      <button class="show-btn" id="sentence-show-btn" onclick="showSentenceAnswers()">
        💡 Show Answers
      </button>
      <div class="answers-list hidden" id="sentence-answers"></div>
    </div>

    <div class="bottom-bar">
      <button class="nav-btn" id="sentence-prev" onclick="prevItem('sentence')">◀ Previous</button>
      <button class="nav-btn next-btn" id="sentence-next" onclick="nextItem('sentence')">Next ▶</button>
    </div>
  </div>

  <script>

dım"],"answer":"Retorik","example":"His rhetoric is persuasive but empty."},{"word":"Scrutinize","level":"C1","options":["İncelemek","Görmezden gelmek","Kabul etmek","Atlamak"],"answer":"İncelemek","example":"We will scrutinize the proposal carefully."},{"word":"Subvert","level":"C1","options":["Yıkmak","Desteklemek","Güçlendirmek","Korumak"],"answer":"Yıkmak","example":"They tried to subvert the government."},{"word":"Tenacious","level":"C1","options":["İnatçı","Vazgeçen","Kolayca pes eden","Değişken"],"answer":"İnatçı","example":"She is tenacious in her goals."},{"word":"Unprecedented","level":"C1","options":["Benzeri görülmemiş","Sıradan","Alışılmış","Tekrar eden"],"answer":"Benzeri görülmemiş","example":"This is an unprecedented situation."},{"word":"Vindictive","level":"C1","options":["Kinci","Affedici","Anlayışlı","Merhametli"],"answer":"Kinci","example":"His vindictive nature cost him dearly."},{"word":"Wane","level":"C1","options":["Azalmak","Güçlenmek","Artmak","Büyümek"],"answer":"Azalmak","example":"Her interest began to wane."},{"word":"Wary","level":"C1","options":["Tedirgin","Dikkatsiz","Kayıtsız","Güvenen"],"answer":"Tedirgin","example":"Be wary of strangers."},{"word":"Zealous","level":"C1","options":["Hevesli","İlgisiz","Tembel","Pes eden"],"answer":"Hevesli","example":"He is zealous in his beliefs."}],"sentence_practice":[{"question":"What do you like to do in your free time?","level":"B1","alternatives":["I love reading books and listening to music.","I usually go for a walk or meet my friends.","I enjoy watching films and playing video games."]},{"question":"Describe your best friend.","level":"B1","alternatives":["My best friend is very kind and makes me laugh.","She is honest and I can talk to her about everything.","My best friend has known me for many years and we trust each other."]},{"question":"What is your daily routine?","level":"B1","alternatives":["I wake up at 7, have breakfast, and go to work at 8.","I exercise for an hour, then work until 5 o'clock.","I study in the morning, have lunch, and relax in the afternoon."]},{"question":"What is your favourite food and why?","level":"B1","alternatives":["I love pizza because it is delicious and satisfying.","My favourite food is pasta with tomato sauce.","I enjoy eating fresh sushi because it is healthy and tasty."]},{"question":"Tell me about your family.","level":"B1","alternatives":["I have two parents and one sister.","My family is close and we spend time together every weekend.","I have a big family with many cousins and aunts."]},{"question":"What is your favourite season and why?","level":"B1","alternatives":["I like summer because the weather is warm.","Spring is my favourite because flowers bloom everywhere.","I prefer autumn because the leaves change beautiful colours."]},{"question":"Where would you like to go on holiday?","level":"B1","alternatives":["I want to visit Paris and see the Eiffel Tower.","I would like to go to Japan to experience the culture.","I dream of going to the beach in Thailand."]},{"question":"What sport do you enjoy?","level":"B1","alternatives":["I enjoy playing football with my friends.","Tennis is my favourite sport because it is exciting.","I like swimming because it keeps me fit and healthy."]},{"question":"Describe your hometown.","level":"B1","alternatives":["My hometown is a small city with friendly people.","It is located near the mountains and is very beautiful.","My hometown is busy but has a nice park in the center."]},{"question":"What did you do last weekend?","level":"B1","alternatives":["I went shopping with my family.","I visited my grandparents and had dinner together.","I stayed home and watched films all day."]},{"question":"What is your favourite film? Why?","level":"B1","alternatives":["I like action films because they are exciting.","My favourite is a romantic comedy because it makes me laugh.","I enjoy adventure films with interesting stories."]},{"question":"What are your hobbies?","level":"B1","alternatives":["I enjoy painting and drawing in my spare time.","My hobbies are reading and playing the guitar.","I like cooking, gardening, and photography."]},{"question":"How do you get to school or work?","level":"B1","alternatives":["I take the bus every day.","I drive my car to work.","I walk because it is close to my house."]},{"question":"What do you usually eat for breakfast?","level":"B1","alternatives":["I eat bread with cheese and drink coffee.","I prefer cereal with milk and fruit.","I usually have eggs, bacon, and toast."]},{"question":"Describe your bedroom.","level":"B1","alternatives":["My bedroom is small but comfortable and cozy.","It has a blue wall and a big window.","My bedroom has a bed, desk, and bookshelf."]},{"question":"What are you good at?","level":"B1","alternatives":["I am good at languages and learning quickly.","I am talented at drawing and painting.","I am skilled at sports and team games."]},{"question":"What time do you usually go to bed?","level":"B1","alternatives":["I go to bed at 11 o'clock on weekdays.","I sleep around 10 o'clock during the week.","I go to bed late at midnight on weekends."]},{"question":"Do you prefer summer or winter? Why?","level":"B1","alternatives":["I prefer summer because I can go to the beach.","I like winter because of the snow and holidays.","I enjoy both seasons but prefer summer for outdoor activities."]},{"question":"What was your favourite subject at school?","level":"B1","alternatives":["My favourite subject was English because I love languages.","I enjoyed science the most because of interesting experiments.","History was my favourite because I liked learning about the past."]},{"question":"Describe a typical weekend for you.","level":"B1","alternatives":["I sleep late, have lunch with friends, and relax at home.","I do sports in the morning and visit family in the afternoon.","I go shopping, watch films, and have dinner out."]},{"question":"What is the most important thing you own?","level":"B1","alternatives":["My phone because I use it every day.","A photo of my family because it is precious.","My laptop because I need it for work and studying."]},{"question":"Tell me about a place you have visited.","level":"B1","alternatives":["I visited Rome and saw the Colosseum.","I went to the beach in Spain last year.","I travelled to London and enjoyed the museums."]},{"question":"What do you usually do after school or work?","level":"B1","alternatives":["I go to the gym or exercise.","I have a snack and relax at home.","I meet friends or do homework."]},{"question":"Do you like cooking? What can you make?","level":"B1","alternatives":["Yes, I can make pasta and simple salads.","I like cooking and can prepare basic meals.","I enjoy cooking rice dishes and vegetables."]},{"question":"What kind of music do you listen to?","level":"B1","alternatives":["I like pop and rock music.","I enjoy jazz and classical music.","I prefer hip-hop and contemporary music."]},{"question":"Tell me about your neighbourhood.","level":"B1","alternatives":["My neighbourhood is quiet and peaceful.","It is a busy area with shops and restaurants.","It has a nice park and friendly people."]},{"question":"What do you enjoy watching on TV?","level":"B1","alternatives":["I watch films and documentaries.","I enjoy sports matches and cooking shows.","I like comedy series and drama programmes."]},{"question":"Who is your role model and why?","level":"B1","alternatives":["My role model is my teacher because she is kind.","I admire scientists who help humanity.","My parents are my role models because they work hard."]},{"question":"What languages do you speak?","level":"B1","alternatives":["I speak English and my native language.","I speak three languages: English, French, and German.","I can speak English and some Spanish."]},{"question":"How often do you exercise?","level":"B1","alternatives":["I exercise three times a week.","I go to the gym every day.","I exercise on weekends when I have time."]},{"question":"Do you prefer reading books or watching films? Why?","level":"B1","alternatives":["I prefer films because they are faster and more visual.","I like books because I can imagine the scenes.","I enjoy both equally depending on my mood."]},{"question":"What was the best birthday you ever had?","level":"B1","alternatives":["My best birthday was when my family surprised me with a party.","I had a great day with my friends at the beach.","My best birthday was when I received the gift I wanted."]},{"question":"Describe your daily schedule.","level":"B1","alternatives":["I wake at 7, work until 5, then relax and sleep.","I study in the morning, have lunch, and exercise.","I start work at 8, have breaks, and finish at 6."]},{"question":"What is something you want to learn?","level":"B1","alternatives":["I want to learn to play the piano.","I would like to learn how to cook better.","I want to become fluent in another language."]},{"question":"Tell me about a memorable meal.","level":"B1","alternatives":["I had a wonderful meal with my family at Christmas.","I remember a special dinner on my birthday.","A beautiful meal at a restaurant by the sea was memorable."]},{"question":"What is your favourite shop and why?","level":"B1","alternatives":["I like the mall because it has many shops.","My favourite shop has good prices and nice clothes.","I enjoy shopping there because the staff are friendly."]},{"question":"How do you spend time with your family?","level":"B1","alternatives":["We have dinner together every evening.","We play games and watch films together.","We go out for walks and visit relatives."]},{"question":"What pet would you like to have and why?","level":"B1","alternatives":["I would like a dog because they are loyal.","I want a cat because they are independent.","I would like a bird because they are beautiful."]},{"question":"Tell me about the weather in your country.","level":"B1","alternatives":["We have four seasons with warm summers and cold winters.","The weather is usually warm and sunny.","We have rainy winters and dry summers."]},{"question":"What do you think is important in a friendship?","level":"B1","alternatives":["Trust and honesty are most important.","I believe loyalty and understanding matter.","Friends should be supportive and kind to each other."]},{"question":"Describe the school you went to.","level":"B1","alternatives":["My school was a modern building with many classrooms.","It had a large playground and a good library.","My school was in the city with about 500 students."]},{"question":"What would you do on a rainy day?","level":"B1","alternatives":["I would watch films or read a book.","I would stay inside and cook or draw.","I would relax at home and listen to music."]},{"question":"Tell me about a gift you received.","level":"B1","alternatives":["I received a book that I love very much.","I got a beautiful watch for my birthday.","Someone gave me a camera and I enjoy photography now."]},{"question":"What is your favourite colour and why?","level":"B1","alternatives":["Blue is my favourite because it is calming.","I love red because it is bright and energetic.","Green is my favourite because it reminds me of nature."]},{"question":"How do you celebrate your birthday?","level":"B1","alternatives":["I have a party with friends and family.","I go out to eat at my favourite restaurant.","I celebrate quietly with my closest friends."]},{"question":"Do you prefer the city or the countryside? Why?","level":"B1","alternatives":["I prefer the city because of the activities and jobs.","I like the countryside for its peace and nature.","I enjoy both depending on what I want to do."]},{"question":"What is your morning routine?","level":"B1","alternatives":["I wake up, shower, eat breakfast, and get ready.","I exercise first, then shower and have coffee.","I make breakfast, read news, then prepare to leave."]},{"question":"Tell me about a bad day you had.","level":"B1","alternatives":["I had a bad day when I failed my exam.","I had a terrible day when I lost my wallet.","A bad day was when I had an argument with a friend."]},{"question":"What is something that makes you happy?","level":"B1","alternatives":["Spending time with my family makes me happy.","When I achieve my goals, I feel very happy.","Time with friends and good food make me happy."]},{"question":"Describe a person in your family.","level":"B1","alternatives":["My mother is kind, hardworking, and very caring.","My father is tall, intelligent, and funny.","My sister is kind and always helps me with homework."]},{"question":"What would you do if you were the president?","level":"B2","alternatives":["I would improve the education system significantly.","I would focus on reducing poverty and inequality.","I would invest in environmental protection and healthcare."]},{"question":"Describe a time when you overcame a difficult challenge.","level":"B2","alternatives":["When I was bullied at school, I learned to stand up for myself.","I overcame my fear of public speaking through practice.","When my family faced financial problems, we worked together."]},{"question":"What are the advantages and disadvantages of social media?","level":"B2","alternatives":["It helps us connect globally, but it wastes time and spreads false information.","Social media is great for businesses but harmful to mental health.","It allows sharing but creates addiction and privacy concerns."]},{"question":"If you could live in any country, where would it be and why?","level":"B2","alternatives":["I would choose Japan for its technology and culture.","I would like to live in Canada for the beautiful nature.","I would prefer France for its art, food, and history."]},{"question":"How has technology changed the way we communicate?","level":"B2","alternatives":["We now communicate instantly across the world.","Video calls have replaced many face-to-face meetings.","Technology made communication faster but less personal."]},{"question":"What is your opinion on online education?","level":"B2","alternatives":["Online education is flexible but lacks social interaction.","It is accessible to everyone but requires discipline.","It can be effective with good teaching, but engagement is difficult."]},{"question":"Describe your ideal job and explain why.","level":"B2","alternatives":["I want to be a teacher because I enjoy helping others.","I would like to work in environmental protection to help nature.","I want to be a doctor to save lives and help people."]},{"question":"What changes would you make to improve your city?","level":"B2","alternatives":["I would improve public transportation and reduce pollution.","I would build more green spaces and parks.","I would improve education and healthcare services."]},{"question":"What is your opinion on environmental issues?","level":"B2","alternatives":["Climate change is serious and we must act now.","We need to reduce plastic use and protect forests.","Governments should enforce stricter environmental laws."]},{"question":"How important is learning foreign languages in today's world?","level":"B2","alternatives":["Very important because the world is globalized now.","Languages open career opportunities and cultural understanding.","It is essential for international communication and business."]},{"question":"Do you think television has a positive or negative influence on society?","level":"B2","alternatives":["Television provides information but can be addictive.","It educates people but also spreads violence and materialism.","TV is good for news and entertainment, but too much is harmful."]},{"question":"What are the pros and cons of living in a big city?","level":"B2","alternatives":["Cities have jobs and culture, but pollution and crowding.","More opportunities but higher costs and stress.","Better services but less community feeling."]},{"question":"If you could meet any historical figure, who and why?","level":"B2","alternatives":["I would like to meet Einstein to understand physics.","I would meet Gandhi to learn about peaceful resistance.","I would meet Marie Curie to understand her scientific discoveries."]},{"question":"Describe a time when you had to make a difficult decision.","level":"B2","alternatives":["I had to choose between two job offers.","I decided to move to another city for education.","I had to choose between two important opportunities."]},{"question":"How do you think education will change in 20 years?","level":"B2","alternatives":["There will be more online and personalized learning.","Technology will play a bigger role with AI tutors.","Students will learn differently with virtual reality."]},{"question":"What are the most important qualities of a good leader?","level":"B2","alternatives":["Good leaders are honest, decisive, and inspire others.","They listen to people and make fair decisions.","They have vision, integrity, and emotional intelligence."]},{"question":"Do you think money can buy happiness? Why or why not?","level":"B2","alternatives":["Money can buy comfort, but true happiness comes from relationships.","It brings security but relationships matter more.","Money helps meet needs, but happiness requires more than that."]},{"question":"How has your life changed since you were a child?","level":"B2","alternatives":["I have become more independent and responsible.","I have learned more about myself and the world.","I have more freedom but also more responsibilities."]},{"question":"What do you think about the relationship between technology and privacy?","level":"B2","alternatives":["Technology invades privacy through data collection.","We must balance innovation with personal privacy protection.","Companies know too much about us through technology."]},{"question":"Describe an experience that changed your perspective.","level":"B2","alternatives":["Travelling abroad showed me different ways of living.","Meeting people from different cultures changed my views.","A failure taught me the value of persistence."]},{"question":"What would you do if you won a large amount of money?","level":"B2","alternatives":["I would help my family and invest wisely.","I would travel and pursue my dreams.","I would donate some to charity and save the rest."]},{"question":"How do you think social media affects young people?","level":"B2","alternatives":["It affects mental health and creates unrealistic expectations.","Young people become addicted and compare themselves to others.","It harms self-esteem but also builds community."]},{"question":"What are the advantages of working from home?","level":"B2","alternatives":["You save time and money on commuting.","You have more flexibility and spend time with family.","You can focus better and have a better work-life balance."]},{"question":"What is your opinion on fast food?","level":"B2","alternatives":["Fast food is convenient but unhealthy.","It's good sometimes but shouldn't be regular.","It's quick and affordable but lacks nutrition."]},{"question":"If you could change one thing about your country, what would it be?","level":"B2","alternatives":["I would reduce corruption in government.","I would improve healthcare and education systems.","I would create more job opportunities for young people."]},{"question":"Describe a time when teamwork was important.","level":"B2","alternatives":["During a school project, we achieved more together.","In sports, teamwork helped us win the championship.","At work, collaboration solved a difficult problem."]},{"question":"Do you think famous people should be role models?","level":"B2","alternatives":["They should because people look up to them.","Only if they live according to their values.","Fame doesn't make someone automatically a good role model."]},{"question":"What are your thoughts on climate change?","level":"B2","alternatives":["It's a serious threat that requires immediate action.","We must reduce emissions and protect the environment.","Climate change is real and humans must adapt."]},{"question":"To what extent do you agree that technology has done more harm than good?","level":"C1","alternatives":["Technology has both benefits and serious drawbacks to society overall.","While it improves efficiency, it creates new problems like addiction.","Technology is neutral; the impact depends on how we use it."]},{"question":"Discuss the ethical implications of genetic engineering.","level":"C1","alternatives":["It raises concerns about designer babies and inequality.","We must consider the long-term consequences on humanity.","It offers benefits but requires strict ethical guidelines."]},{"question":"How do cultural differences affect international business relationships?","level":"C1","alternatives":["Understanding culture is essential for business success.","Different values and communication styles create challenges.","Cultural sensitivity can prevent misunderstandings and build trust."]},{"question":"To what extent should freedom of speech be limited?","level":"C1","alternatives":["Speech should be free but not incite violence or harm.","Some limitations are necessary to protect minorities.","The balance between freedom and responsibility is complex."]},{"question":"Critically evaluate the role of media in shaping public opinion.","level":"C1","alternatives":["Media has enormous power to influence how people think.","Bias in media creates polarized views in society.","Media shapes narratives and people's perception of reality."]},{"question":"Discuss the relationship between economic growth and environmental sustainability.","level":"C1","alternatives":["Growth often comes at the cost of environmental degradation.","We need to find ways to balance both concerns.","Sustainable practices can lead to long-term economic health."]},{"question":"What are the sociological effects of urbanization on communities?","level":"C1","alternatives":["Urbanization breaks down traditional communities and values.","It creates diverse societies but can increase isolation.","Cities offer opportunities but social cohesion often weakens."]},{"question":"To what extent is success determined by talent or hard work?","level":"C1","alternatives":["Both are essential; talent without work is wasted potential.","Hard work can overcome lack of talent in most cases.","Success requires talent, work, timing, and luck combined."]},{"question":"Critically analyse the impact of globalisation on national identity.","level":"C1","alternatives":["Globalisation homogenizes cultures and threatens local traditions.","Nations struggle to maintain identity in a global economy.","Cultural exchange can strengthen identity through understanding."]},{"question":"How do childhood experiences shape adult personality?","level":"C1","alternatives":["Early experiences fundamentally shape psychological development.","Family dynamics and childhood trauma affect adult relationships.","Childhood influences values, fears, and coping mechanisms."]},{"question":"Discuss the ethics of social media data collection.","level":"C1","alternatives":["Companies exploit personal data for profit without consent.","Data privacy rights should be strictly protected by law.","Users don't understand what data is collected about them."]},{"question":"To what extent has feminism changed society for the better?","level":"C1","alternatives":["It advanced women's rights significantly but inequality remains.","Feminism has challenged outdated power structures.","Progress has been made, but gender disparities persist."]},{"question":"What role should governments play in regulating the economy?","level":"C1","alternatives":["Too much regulation stifles innovation and growth.","Some regulation is necessary to prevent abuse.","The balance between free markets and regulation is crucial."]},{"question":"Critically evaluate the effectiveness of international aid.","level":"C1","alternatives":["Aid often gets lost to corruption and doesn't help.","Some aid works, but distribution systems are inefficient.","International aid should focus on sustainable development."]},{"question":"How does language influence the way we think?","level":"C1","alternatives":["Language shapes perception and thoughts in profound ways.","Different languages reveal different conceptual frameworks.","Language both reflects and constrains how we think."]},{"question":"To what extent is social inequality inevitable in capitalism?","level":"C1","alternatives":["Capitalism inherently creates wealth gaps and inequality.","Market economies can reduce inequality through regulation.","Some inequality is inevitable, but we can manage it better."]},{"question":"Discuss the psychological effects of social media on mental health.","level":"C1","alternatives":["Social media increases anxiety, depression, and low self-esteem.","Constant comparison and validation-seeking harm mental health.","Social media can worsen existing mental health issues."]},{"question":"What are the philosophical implications of artificial intelligence?","level":"C1","alternatives":["AI challenges our definition of consciousness and humanity.","If AI becomes conscious, we face new ethical dilemmas.","AI raises questions about the nature of intelligence itself."]},{"question":"To what extent is democracy the most effective form of government?","level":"C1","alternatives":["Democracy is imperfect but better than alternatives.","Democracy doesn't guarantee good outcomes or rights.","The effectiveness of democracy depends on institutions."]},{"question":"Critically assess the role of art in society.","level":"C1","alternatives":["Art expresses what cannot be said through words.","Art preserves culture and challenges societal norms.","Art provides meaning and emotional connection in society."]},{"question":"How does media construct and reinforce gender stereotypes?","level":"C1","alternatives":["Media perpetuates narrow gender roles and expectations.","Advertising particularly reinforces traditional gender stereotypes.","Media representation influences how people see gender roles."]},{"question":"Discuss the implications of an aging population on healthcare systems.","level":"C1","alternatives":["Aging populations increase healthcare costs significantly.","Systems must adapt to care for chronic diseases.","Elderly care will strain resources and budgets globally."]},{"question":"To what extent should education prioritise academic knowledge over practical skills?","level":"C1","alternatives":["Both are essential; academia without skills is incomplete.","Practical skills are often more valuable in employment.","Education should balance theory and practical application."]},{"question":"What are the ethical considerations surrounding euthanasia?","level":"C1","alternatives":["It raises questions about right to die and medical ethics.","Each case has unique circumstances and moral complexity.","Society must balance compassion with protection of life."]},{"question":"How does cultural imperialism affect developing nations?","level":"C1","alternatives":["Western culture dominates and erases local traditions.","Developing nations lose cultural identity through globalization.","Cultural imperialism creates dependency and resentment."]},{"question":"Critically evaluate the concept of meritocracy.","level":"C1","alternatives":["Meritocracy is a myth because privilege affects opportunity.","Systems are never truly merit-based due to structural inequality.","Merit exists but is influenced by privilege and circumstance."]},{"question":"To what extent does history repeat itself?","level":"C1","alternatives":["History doesn't repeat exactly but patterns emerge.","Similar situations produce similar outcomes due to human nature.","Context varies so history rarely repeats precisely."]},{"question":"Discuss the role of religion in modern secular societies.","level":"C1","alternatives":["Religion remains important for millions despite secularization.","Secular and religious worldviews increasingly conflict.","Societies must balance religious freedom with secular values."]},{"question":"How does architecture reflect the values of a society?","level":"C1","alternatives":["Buildings reveal what a society prioritizes and values.","Architecture shows economic power, aesthetic preferences, and beliefs.","Design choices reflect cultural identity and social hierarchies."]},{"question":"What are the implications of mass surveillance for civil liberties?","level":"C1","alternatives":["Mass surveillance fundamentally threatens privacy and freedom.","People self-censor when they know they are watched.","Governments use surveillance to control and suppress dissent."]},{"question":"Critically analyse the concept of 'the greater good'.","level":"C1","alternatives":["'Greater good' can justify oppression of minorities.","It's often used to ignore individual rights and freedoms.","Finding balance between individual and collective wellbeing is complex."]},{"question":"How do economic disparities affect access to education?","level":"C1","alternatives":["Poverty limits educational opportunities for billions.","Economic inequality perpetuates education gaps between rich and poor.","Quality education remains inaccessible to disadvantaged populations."]},{"question":"To what extent is beauty subjective?","level":"C1","alternatives":["Beauty is entirely cultural and subjective.","Some universal standards of beauty might exist.","Beauty is both biological and culturally constructed."]},{"question":"Discuss the ethical dimensions of animal rights.","level":"C1","alternatives":["Animals deserve protection from unnecessary suffering.","We must balance human needs with animal welfare.","Animal exploitation requires ethical justification in modern society."]},{"question":"How has the rise of populism affected democratic institutions?","level":"C1","alternatives":["Populism undermines checks and balances and institutional stability.","It challenges established elites but can be oits marginalized cultures for profit.","Context matters in whether cultural exchange becomes appropriation.","The line between appreciation and appropriation is complex."]},{"question":"To what extent can morality be universal?","level":"C1","alternatives":["Some moral principles may be universal across cultures.","Morality is culturally relative and context-dependent.","Universal and relative morality likely coexist."]}]};
let currentMode = null;
let filteredItems = [];
let currentIndex = 0;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function loadData() {
  // Shuffle once on load so order is random every session
  data.vocabulary = shuffle(data.vocabulary);
  data.sentence_practice = shuffle(data.sentence_practice);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goHome() {
  currentMode = null;
  showScreen('screen-home');
}

function goLevelSelect() {
  showScreen('screen-level');
}

async function startMode(mode) {
  if (!data.vocabulary.length) loadData();
  currentMode = mode;
  document.getElementById('level-mode-title').textContent =
    mode === 'vocabulary' ? 'Vocabulary' : 'Sentence Practice';
  showScreen('screen-level');
}

function selectLevel(level) {
  if (currentMode === 'vocabulary') {
    const pool = level === 'mixed'
      ? data.vocabulary
      : data.vocabulary.filter(item => item.level === level);
    filteredItems = shuffle(pool);
    currentIndex = 0;
    renderVocab();
    showScreen('screen-vocabulary');
  } else {
    const pool = level === 'mixed'
      ? data.sentence_practice
      : data.sentence_practice.filter(item => item.level === level);
    filteredItems = shuffle(pool);
    currentIndex = 0;
    renderSentence();
    showScreen('screen-sentence');
  }
}

/* ── VOCABULARY ── */
function renderVocab() {
  const total = filteredItems.length;

  if (total === 0) {
    document.getElementById('vocab-word').textContent = '';
    document.getElementById('vocab-example-text').textContent = '';
    document.getElementById('vocab-level').textContent = '';
    document.getElementById('vocab-counter').textContent = '0 / 0';
    document.getElementById('vocab-show-btn').classList.add('hidden');
    document.getElementById('vocab-options').innerHTML =
      '<div class="no-results"><span>🔍</span>No questions available for this level.</div>';
    document.getElementById('vocab-options').classList.remove('hidden');
    document.getElementById('vocab-prev').disabled = true;
    document.getElementById('vocab-next').disabled = true;
    return;
  }

  const item = filteredItems[currentIndex];
  document.getElementById('vocab-counter').textContent = `${currentIndex + 1} / ${total}`;
  document.getElementById('vocab-level').textContent = item.level;
  document.getElementById('vocab-word').textContent = item.word;
  document.getElementById('vocab-example-text').textContent = item.example;

  const grid = document.getElementById('vocab-options');
  grid.innerHTML = '';
  grid.classList.add('hidden');

  const showBtn = document.getElementById('vocab-show-btn');
  showBtn.classList.remove('hidden');
  showBtn.textContent = '👁 Show Options';

  document.getElementById('vocab-prev').disabled = currentIndex === 0;
  document.getElementById('vocab-next').disabled = currentIndex === total - 1;
}

function showVocabOptions() {
  const item = filteredItems[currentIndex];
  const grid = document.getElementById('vocab-options');

  const opts = shuffle(item.options);
  grid.innerHTML = '';
  opts.forEach(opt => {
    const card = document.createElement('button');
    card.className = 'option-card';
    card.textContent = opt;
    card.onclick = () => selectOption(grid, opt, item.answer);
    grid.appendChild(card);
  });

  grid.classList.remove('hidden');
  document.getElementById('vocab-show-btn').classList.add('hidden');
}

function selectOption(grid, selected, answer) {
  grid.querySelectorAll('.option-card').forEach(c => {
    c.onclick = null;
    c.classList.add(c.textContent === answer ? 'correct' : 'wrong');
  });
}

/* ── SENTENCE ── */
function renderSentence() {
  const total = filteredItems.length;

  if (total === 0) {
    document.getElementById('sentence-question').textContent = '';
    document.getElementById('sentence-level').textContent = '';
    document.getElementById('sentence-counter').textContent = '0 / 0';
    document.getElementById('sentence-show-btn').classList.add('hidden');
    document.getElementById('sentence-answers').innerHTML =
      '<div class="no-results"><span>🔍</span>No questions available for this level.</div>';
    document.getElementById('sentence-answers').classList.remove('hidden');
    document.getElementById('sentence-prev').disabled = true;
    document.getElementById('sentence-next').disabled = true;
    return;
  }

  const item = filteredItems[currentIndex];
  document.getElementById('sentence-counter').textContent = `${currentIndex + 1} / ${total}`;
  document.getElementById('sentence-level').textContent = item.level;
  document.getElementById('sentence-question').textContent = item.question;

  const list = document.getElementById('sentence-answers');
  list.innerHTML = '';
  list.classList.add('hidden');

  const showBtn = document.getElementById('sentence-show-btn');
  showBtn.classList.remove('hidden');

  document.getElementById('sentence-prev').disabled = currentIndex === 0;
  document.getElementById('sentence-next').disabled = currentIndex === total - 1;
}

function showSentenceAnswers() {
  const item = filteredItems[currentIndex];
  const list = document.getElementById('sentence-answers');

  list.innerHTML = '';
  item.alternatives.forEach((alt, i) => {
    const card = document.createElement('div');
    card.className = 'answer-card';
    card.innerHTML = `<span class="answer-num">${i + 1}</span><span>${alt}</span>`;
    list.appendChild(card);
  });

  list.classList.remove('hidden');
  document.getElementById('sentence-show-btn').classList.add('hidden');
}

/* ── NAVIGATION ── */
function nextItem(mode) {
  if (currentIndex < filteredItems.length - 1) {
    currentIndex++;
    mode === 'vocabulary' ? renderVocab() : renderSentence();
  }
}

function prevItem(mode) {
  if (currentIndex > 0) {
    currentIndex--;
    mode === 'vocabulary' ? renderVocab() : renderSentence();
  }
}

/* ── KEYBOARD SHORTCUTS ── */
document.addEventListener('keydown', e => {
  const vocabActive   = document.getElementById('screen-vocabulary').classList.contains('active');
  const sentenceActive = document.getElementById('screen-sentence').classList.contains('active');
  const levelActive   = document.getElementById('screen-level').classList.contains('active');

  if (e.key === 'ArrowRight') {
    if (vocabActive)    nextItem('vocabulary');
    if (sentenceActive) nextItem('sentence');
  } else if (e.key === 'ArrowLeft') {
    if (vocabActive)    prevItem('vocabulary');
    if (sentenceActive) prevItem('sentence');
  } else if (e.key === ' ' || e.key === 'Enter') {
    e.preventDefault();
    if (vocabActive) {
      const btn = document.getElementById('vocab-show-btn');
      if (!btn.classList.contains('hidden')) showVocabOptions();
    }
    if (sentenceActive) {
      const btn = document.getElementById('sentence-show-btn');
      if (!btn.classList.contains('hidden')) showSentenceAnswers();
    }
  } else if (e.key === 'Escape') {
    if (vocabActive || sentenceActive) goLevelSelect();
    else if (levelActive) goHome();
  }
});

loadData();
  </script>
